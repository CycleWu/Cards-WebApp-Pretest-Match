<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>巴哈伊經典卡</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1 data-i18n="ui_title">經典卡抽卡</h1>

      <div class="theme-switch-container">
        <span class="mode-label">淺色</span>
        <label class="switch">
          <input type="checkbox" id="themeToggleCheckbox">
          <span class="slider round"></span>
        </label>
        <span class="mode-label">深色</span>
      </div>
      
      <div class="tiers-container">
        <div class="segmented-control">
          <input type="radio" name="lang" id="lang-zh" value="zh" checked>
          <label for="lang-zh">繁中</label>

          <input type="radio" name="lang" id="lang-jp" value="jp">
          <label for="lang-jp">日本語</label>

          <input type="radio" name="lang" id="lang-en" value="en">
          <label for="lang-en">English</label>

          <input type="radio" name="lang" id="lang-ko" value="ko" disabled>
          <label for="lang-ko">한국어</label>
        </div>

        <div class="segmented-control">
          <input type="radio" name="source" id="source-classic" value="classic" checked>
          <label for="source-classic" data-i18n="ui_source_classic">經典卡</label>

          <input type="radio" name="source" id="source-hidden" value="hidden">
          <label for="source-hidden" data-i18n="ui_source_hidden">隱言經</label>
        </div>

        <div class="segmented-control">
          <input type="radio" name="mode" id="mode-simple" value="simple" checked>
          <label for="mode-simple" data-i18n="ui_mode_simple">簡單模式</label>

          <input type="radio" name="mode" id="mode-divination" value="divination">
          <label for="mode-divination" data-i18n="ui_mode_divination">占卜模式</label>
        </div>
      </div>
    </header>

    <main>
      <div id="simpleModeGroup">
        <section class="deck-section">
          <div id="deckClassic" class="deck-stack">
            <img id="deckClassicImg" src="./imgs/zh_cards_Back.png" alt="卡牌背面" />
          </div>
        </section>
        <section class="card-display" style="display: none;">
          <div id="cardImageWrapper" class="card-image-wrapper" style="display: none;">
            <img id="cardImage" src="" alt="Card Image" />
          </div>
          <div class="card-inner">
            <h2 id="cardName" class="card-name"></h2>
            <p id="cardDescription" class="card-description"></p>
          </div>
        </section>
        <section class="controls">
          <button id="drawButton" class="btn primary" data-i18n="ui_draw_btn">抽卡</button>
        </section>
      </div>

      <div id="textOnlyModeGroup" style="display: none;">
        <section class="deck-section">
          <div id="deckTextOnly" class="deck-stack">
            <img id="deckTextOnlyImg" src="./imgs/HW_Cover_Light.png" alt="卡牌背面" />
          </div>
        </section>
        <section class="card-display" style="display: none;">
          <div class="card-inner">
            <h2 id="textCardName" class="card-name"></h2>
            <p id="textCardDescription" class="card-description"></p>
          </div>
        </section>
        <section class="controls">
          <button id="drawButtonTextOnly" class="btn primary" data-i18n="ui_draw_btn">抽卡</button>
        </section>
      </div>

      <div id="divinationModeDisplay" style="display: none;">
        <section class="divination-selection">
          <p id="selectionCounter" class="hint-text"></p>
          <div id="cardSpread" class="card-grid"></div>
        </section>
        <div id="divinationPlaceholder" style="display: none;"></div>
        <div id="divinationFullResults" style="display: none;">
          <h3 class="result-title"></h3>
          <div id="resultsContainer"></div>
          <button id="resetDivinationBtn" class="btn primary"></button>
        </div>
      </div>
      
      <section class="status" id="mainStatusSection">
        <p id="statusText">正在初始化...</p>
        <label class="toggle" id="imageToggleContainer">
          <input type="checkbox" id="toggleImage" checked />
          <span data-i18n="ui_image_toggle">顯示卡牌圖片</span>
        </label>
      </section>
    </main>

    <footer class="app-footer">
      <small>本頁不會儲存任何個人資料，僅做卡牌內容顯示與抽卡互動。</small>
      <br />
      <small>Provide by Siganmorfu, Cycle , Masa and Shoghi</small>
    </footer>
  </div>

  <script src="main.js"></script>
</body>
</html>
